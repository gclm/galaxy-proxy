feature: 2026-05-26-models-api
status: approved
steps:
  - name: database-migration
    description: model_maps 重命名为 models，迁移旧数据
    check: 字段存在且旧数据已迁移
    status: done

  - name: fetch-models-service
    description: 实现 fetch_models 函数（支持 OpenAI/Anthropic/Gemini）
    check: 能调用上游 /v1/models 并解析响应
    status: done

  - name: openai-fetch
    description: 实现 fetch_openai_models
    check: 正确解析 OpenAI 模型列表响应
    status: done

  - name: anthropic-fetch
    description: 实现 fetch_anthropic_models
    check: 正确解析 Anthropic 模型列表响应（含分页）
    status: done

  - name: gemini-fetch
    description: 实现 fetch_gemini_models
    check: 正确解析 Gemini 模型列表响应（含分页）
    status: done

  - name: api-endpoint
    description: 新增 POST /api/v1/admin/fetch-models
    check: 返回模型列表 JSON 数组
    status: done

  - name: channel-crud-update
    description: channels create/update/get 支持 models 字段
    check: 创建/更新/查询渠道时 models 字段正确读写
    status: done

  - name: proxy-adapter
    description: apply_model_mapping 从 models.model_maps 读取
    check: 模型映射功能正常工作
    status: done

  - name: error-handling
    description: 上游不可达/无效 Key 时的错误处理
    check: 返回合适的 HTTP 状态码和错误信息
    status: done

  - name: unit-tests
    description: fetch_models 单元测试
    check: 覆盖正常/错误/超时场景
    status: done

