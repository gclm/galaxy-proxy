<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32">
      <stop offset="0%" stop-color="#0F0B1E"/>
      <stop offset="100%" stop-color="#0C1425"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="32" y2="32">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="32" y2="32">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- 深色背景 -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>

  <!-- 轨道环 -->
  <ellipse cx="16" cy="16" rx="13" ry="4.5" stroke="url(#ring)" stroke-width="0.8" fill="none" transform="rotate(-30 16 16)"/>
  <ellipse cx="16" cy="16" rx="13" ry="4.5" stroke="url(#ring)" stroke-width="0.8" fill="none" transform="rotate(30 16 16)"/>
  <ellipse cx="16" cy="16" rx="13" ry="4.5" stroke="url(#ring)" stroke-width="0.8" fill="none" transform="rotate(90 16 16)"/>

  <!-- 轨道光点 -->
  <circle cx="26.5" cy="12" r="1.2" fill="#C4B5FD" opacity="0.9"/>
  <circle cx="5.5" cy="20" r="1.2" fill="#C4B5FD" opacity="0.9"/>
  <circle cx="12" cy="5.5" r="1.2" fill="#06B6D4" opacity="0.8"/>
  <circle cx="20" cy="26.5" r="1.2" fill="#06B6D4" opacity="0.8"/>
  <circle cx="20" cy="5.5" r="1" fill="#818CF8" opacity="0.7"/>
  <circle cx="12" cy="26.5" r="1" fill="#818CF8" opacity="0.7"/>

  <!-- 中心核心 -->
  <circle cx="16" cy="16" r="3" fill="url(#core)"/>
  <circle cx="16" cy="16" r="1.5" fill="#E0E7FF" opacity="0.9"/>
</svg>
